name: Build and Update CV

on:
  push:
    branches: [ main ]
    paths:
      - '**/*.tex' # Only triggers when LaTeX files change

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: |
            cv.tex
            resume.tex

      - name: Convert PDF to PNG
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          
          # 1. Create the directories if they don't already exist
          mkdir -p assets/images assets/docs
          
          # 2. Generate PNGs ONLY for the CV
          pdftoppm cv.pdf assets/images/cv-page -png -rx 300 -ry 300
          
          # 3. Move the compiled PDFs into the docs folder
          mv cv.pdf assets/docs/
          mv resume.pdf assets/docs/

      - name: Commit and Push generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-compile CV PDF and generate PNGs"
          file_pattern: '*.pdf *.png'
